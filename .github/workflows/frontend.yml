name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/schema.graphql"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/schema.graphql"
      - ".github/workflows/frontend.yml"

jobs:
  build-and-publish:
    runs-on: self-hosted
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Sync GraphQL schema
        run: cp backend/schema.graphql frontend/schema.graphql

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./frontend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/timelines-frontend:latest
            ghcr.io/${{ github.repository_owner }}/timelines-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_WS_URL=${{ secrets.VITE_WS_URL }}
            VITE_APP_ENV=${{ secrets.VITE_APP_ENV }}
            VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}
            VITE_NEW_RELIC_ACCOUNT_ID=${{ secrets.VITE_NEW_RELIC_ACCOUNT_ID }}
            VITE_NEW_RELIC_AGENT_ID=${{ secrets.VITE_NEW_RELIC_AGENT_ID }}
            VITE_NEW_RELIC_APPLICATION_ID=${{ secrets.VITE_NEW_RELIC_APPLICATION_ID }}
            VITE_NEW_RELIC_LICENSE_KEY=${{ secrets.VITE_NEW_RELIC_LICENSE_KEY }}
